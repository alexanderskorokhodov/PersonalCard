<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <style>
    @font-face {
      font-family: "FaviconInter";
      src: url("/fonts/inter-700.woff2") format("woff2");
      font-style: normal;
      font-weight: 700;
    }

    .monogram {
      font-family: "FaviconInter", "Inter", ui-sans-serif, system-ui, sans-serif;
      font-size: 29px;
      font-style: normal;
      font-weight: 700;
      letter-spacing: -0.12em;
    }
  </style>

  <defs>
    <linearGradient id="surface" x1="10" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFBF8" />
      <stop offset="1" stop-color="#F2F2F1" />
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="18" fill="url(#surface)" />
  <rect x="2.5" y="2.5" width="59" height="59" rx="17.5" stroke="#0C0C0C" stroke-opacity="0.08" />
  <text
    x="50%"
    y="52%"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="#0C0C0C"
    class="monogram"
  >
    AS
  </text>
</svg>
